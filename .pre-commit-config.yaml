default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v2.3.0
  hooks:
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace

- repo: https://github.com/psf/black
  rev: 26.5.1
  hooks:
  - id: black

- repo: https://github.com/astral-sh/uv-pre-commit
  # uv version.
  rev: 0.11.24
  hooks:
    - id: uv-lock
    - id: uv-sync
